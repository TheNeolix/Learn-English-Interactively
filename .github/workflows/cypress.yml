name: Cypress Tests
on: [push]
jobs:
  cypress-run:
    runs-on: ubuntu-latest
    # Runs tests in parallel with matrix strategy https://on.cypress.io/parallelization
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2] # Uses 2 parallel instances
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Note: Updated from v6 to v4, which is the current stable version

      - name: Cypress run
        uses: cypress-io/github-action@v6 # Note: Updated from v7 to v6, which is the current stable version
        with:
          # Use the built-in PHP server to serve your site on port 8000
          start: php -S localhost:8000
          # Tell Cypress to wait for the PHP server to be ready on port 8000
          wait-on: 'http://localhost:8000'
          # Records to Cypress Cloud 
          record: true
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

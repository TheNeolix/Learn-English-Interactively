name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 18 * * 4' # Runs weekly on Thursday evenings

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ] # Scans JS files. You can add 'php' here if scanning PHP files.

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Query suites can be "security-extended" or "security-and-quality"
        queries: security-extended 

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - name: Notify Slack on Success
      if: success()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          curl -X POST -H 'Content-type: application/json' --data '{"text":"✅ *CodeQL Security Scan Passed* for <https://github.com/Neolix-Studio/Learn-English-Interactively/commit/${{ github.sha }}|${{ github.sha }}> (branch `${{ github.ref_name }}` by ${{ github.actor }})"}' "$SLACK_WEBHOOK_URL"
        fi

    - name: Notify Slack on Failure
      if: failure()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          curl -X POST -H 'Content-type: application/json' --data '{"text":"❌ *CodeQL Security Scan Failed* for <https://github.com/Neolix-Studio/Learn-English-Interactively/commit/${{ github.sha }}|${{ github.sha }}> (branch `${{ github.ref_name }}` by ${{ github.actor }})"}' "$SLACK_WEBHOOK_URL"
        fi
